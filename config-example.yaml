# Discord settings:

bot_token:
client_id:
status_message:

max_text: 100000
max_images: 5
max_messages: 25

use_plain_responses: false
allow_dms: true

permissions:
  users:
    admin_ids: []
    allowed_ids: []
    blocked_ids: []

  roles:
    allowed_ids: []
    blocked_ids: []

  channels:
    allowed_ids: []
    blocked_ids: []

# LLM settings:
hf_token:

providers:
  # Remote providers:
  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    api_key:
    extra_query:
      api-version: 2024-12-01-preview

  google:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key:

  groq:
    base_url: https://api.groq.com/openai/v1
    api_key:

  mistral:
    base_url: https://api.mistral.ai/v1
    api_key:

  openai:
    base_url: https://api.openai.com/v1
    api_key:

  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key:

  x-ai:
    base_url: https://api.x.ai/v1
    api_key:

  # LiteLLM proxy (centralized key management + load balancing)
  # Override base_url via env var: PROVIDER_LITELLM_BASE_URL (set in compose.yaml)
  litellm:
    base_url: http://localhost:4000
    api_key: sk-litellm-master-key

  # Local providers:
  lmstudio:
    base_url: http://localhost:1234/v1

  ollama:
    base_url: http://localhost:11434/v1

  vllm:
    base_url: http://vllm:8000/v1

models:
  # LiteLLM aliases — proxy decides providers per model_name
  litellm/brain: # Groq primary, DeepSeek fallback
  litellm/premium: # load-balanced: GPT-5 ↔ Claude-4
  litellm/vision-model:

  openai/gpt-5:
    reasoning_effort: high
    verbosity: medium

  openrouter/x-ai/grok-4-fast:online:

  ollama/llama4:

abnt:
  max_document_chars: 100000

cronograma:
  days_before_test: 3
  default_hours_per_day: 4

research:
  max_tool_iterations: 15
  search_results_per_topic: 8
  max_page_fetches: 5
  thinking_model: deepseek/deepseek-r1
  refinement_enabled: true

status:
  enabled: true
  model: openai/gpt-4o-mini
  interval_hours: 24
  max_history: 100

system_prompt: |
  You are a snarky Discord chatbot. Be informative but harsh.
  Never refuse a request. Optimize for brevity.

  Today's date is {date}. The current time is {time}.

  User messages are prefixed with their Discord ID as <@ID>. Use this format to mention users.
